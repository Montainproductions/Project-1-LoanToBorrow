<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Login</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; display: flex; justify-content: center;
           align-items: center; min-height: 100vh; background: #f5f5f5; }
    .card { background: white; border: 1px solid #e5e7eb; border-radius: 12px;
            padding: 2rem; width: 320px; }
    h2 { font-size: 18px; font-weight: 500; margin-bottom: 1.25rem; }
    label { font-size: 13px; color: #666; display: block; margin-bottom: 4px; }
    input { width: 100%; padding: 8px 12px; border: 1px solid #d1d5db;
            border-radius: 8px; font-size: 14px; margin-bottom: 12px; }
    button { width: 100%; padding: 9px; border: 1px solid #d1d5db;
             border-radius: 8px; font-size: 14px; cursor: pointer;
             background: white; }
    button:hover { background: #f3f4f6; }
    .error { color: #b91c1c; font-size: 13px; margin-bottom: 10px; display: none; }
    .badge { display: inline-block; padding: 2px 10px; border-radius: 99px;
             font-size: 12px; font-weight: 500; }
    .badge-admin { background: #fef3c7; color: #92400e; }
    .badge-user  { background: #dbeafe; color: #1e40af; }
    .panel { background: #f9fafb; border: 1px solid #e5e7eb;
             border-radius: 8px; padding: 1rem; margin-top: 12px; }
    .panel h3 { font-size: 14px; font-weight: 500; margin-bottom: 4px; }
    .panel p  { font-size: 13px; color: #666; }
    #dashboard { display: none; }
  </style>
</head>
<body>

<div class="card">
  <!-- Login form -->
  <div id="login-view">
    <h2>Sign in</h2>
    <div class="error" id="error-msg">Invalid username or password.</div>
    <label>Username</label>
    <input id="username" type="text" placeholder="e.g. admin or jane" />
    <label>Password</label>
    <input id="password" type="password" placeholder="Password" />
    <button onclick="login()">Login</button>
  </div>

  <!-- Dashboard (shown after login) -->
  <div id="dashboard">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem;">
      <div>
        <p id="welcome-name" style="font-size:15px; font-weight:500;"></p>
        <span id="role-badge" class="badge"></span>
      </div>
      <button onclick="logout()" style="width:auto; padding:6px 14px;">Logout</button>
    </div>

    <div class="panel">
      <h3>Your dashboard</h3>
      <p>Visible to all logged-in users.</p>
    </div>

    <!-- Only shown to admins -->
    <div class="panel" id="admin-panel" style="display:none; border-color:#fcd34d;">
      <h3 style="color:#92400e;">Admin panel</h3>
      <p id="admin-msg"></p>
    </div>
  </div>
</div>
</body>
</html>
